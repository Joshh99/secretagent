n:\n        pass\n\n    return _reasoning_fallback(patient_note, question)\n\n\n# =============================================================================\n# L2 workflow: try Python calculator, fallback to simulate\n# =============================================================================\n\ndef distilled_workflow(patient_note: str, question: str) -> float:\n    \"\"\"L2 workflow: try Python extraction + calculation, fallback to LLM simulate.\n\n    This implements the 'distilled' approach:\n    1. Try to identify the calculator from the question using Python pattern matching\n    2. Try to extract values from the patient note using Python regex\n    3. If Python succeeds, compute the result directly (zero LLM cost)\n    4. If Python fails at any step, fallback to simulate_medical_value (LLM)\n    \"\"\"\n    from calculators import calculate\n\n    # Try pure Python first\n    result = calculate(patient_note, question)\n    if result is not None and result.result is not None:\n        return result.result\n\n    # Fallback to LLM\n    return simulate_medical_value(patient_note, question)\n\n\n# =============================================================================\n# L4 workflow: Python-orchestrated pipeline with specialist LLM stages\n# =============================================================================\n\ndef _build_descriptive_fields(calc_name: str) -> list[str]:\n    \"\"\"Build descriptive field names from calculator docstring.\n\n    Turns bare field names (e.g. 'ascites_grade') into descriptive\n    strings (e.g. 'ascites_grade: 0=none, 1=mild/controlled, 2=moderate-severe')\n    so that extract_clinical_values knows what to look for.\n    \"\"\"\n    import calculator_simple\n    doc = calculator_simple.get_calculator_docstring(calc_name) or ''\n    sigs = calculator_simple.get_calculator_signatures()\n    sig = sigs.get(calc_name, {})\n    all_fields = sig.get('required', []) + sig.get('optional', [])\n\n    # Parse \"field_name: description\" lines from docstring\n    field_desc = {}\n    for line in doc.split('\\n'):\n        line = line.strip()\n        # Match lines like \"    bilirubin: Total bilirubin in mg/dL (e.g., 2.5)\"\n        match = re.match(r'(\\w+):\\s+(.+)', line)\n        if match and match.group(1) in all_fields:\n            field_desc[match.group(1)] = match.group(2).strip()\n\n    result = []\n    for f in all_fields:\n        if f in field_desc:\n            result.append(f'{f}: {field_desc[f]}')\n        else:\n            result.append(f)\n    return result\n\n\ndef workflow(patient_note: str, question: str) -> float:\n    \"\"\"L4 workflow: Python-orchestrated with ptools interfaces + LLM extraction.\n\n    Pipeline:\n    1. identify_calculator (ptools) \u2014 LLM identifies which calculator\n    2. _extract_values_two_stage   \u2014 LLM extraction with calculator-specific context\n    3. compute_calculation (ptools) \u2014 Python computes result deterministically\n    Fallback: chain-of-thought reasoning for scoring or failed extraction\n    \"\"\"\n    import calculator_simple\n    from calculators import identify_calculator as python_identify\n\n    signatures = calculator_simple.get_calculator_signatures()\n    available = list(signatures.keys())\n\n    # ---- Stage 1: identify_calculator (ptools interface) ----\n    calc_name = None\n    try:\n        result = identify_calculator(question, available)\n        if isinstance(result, dict):\n            calc_name = result.get(\"calculator_name\")\n            if calc_name and calc_name not in signatures:\n                calc_lower = calc_name.lower()\n                for sig_name in signatures:\n                    if calc_lower in sig_name.lower() or sig_name.lower() in calc_lower:\n                        calc_name = sig_name\n                        break\n                else:\n                    calc_name = None\n    except Exception:\n        pass\n\n    # Python fallback for identification\n    if not calc_name:\n        pattern = python_identify(question)\n        if pattern:\n            for name, spec in calculator_simple.CALCULATOR_REGISTRY.items():\n                if isinstance(spec, calculator_simple.CalculatorSpec):\n                    if pattern.lower() in spec.name.lower():\n                        calc_name = spec.name\n                        break\n\n    if not calc_name:\n        return _reasoning_fallback(patient_note, question)\n\n    # ---- Stage 2: Extract values (LLM with calculator-specific context) ----\n    sig = signatures.get(calc_name, {})\n    required = sig.get(\"required\", [])\n    optional = sig.get(\"optional\", [])\n\n    extracted = _extract_values_two_stage(\n        patient_note, calc_name, required, optional\n    )\n\n    # ---- Stage 3: Validate + compute_calculation (ptools interface) ----\n    is_valid, missing, cleaned = _validate_extracted_values(extracted, calc_name)\n\n    if missing and not is_valid:\n        repaired = _repair_extraction(patient_note, calc_name, cleaned, missing)\n        is_valid, missing, cleaned = _validate_extracted_values(repaired, calc_name)\n\n    if is_valid:\n        try:\n            result = compute_calculation(calc_name, cleaned)\n            if isinstance(result, dict) and result.get('result') is not None:\n                return result['result']\n        except Exception:\n            pass\n\n    # Fallback: chain-of-thought reasoning\n    return _reasoning_fallback(patient_note, question)\n\n# backward compat alias\npipeline_workflow = workflow\n\n\n# =============================================================================\n# L4 helper functions (inline LLM calls for extraction pipeline)\n# =============================================================================\n\ndef _extract_values_two_stage(\n    patient_note: str,\n    calculator_name: str,\n    required_values: list[str],\n    optional_values: list[str],\n) -> dict:\n    \"\"\"Two-stage extraction: medical reasoning \u2192 structured extraction.\"\"\"\n    import calculator_simple\n\n    docstring = calculator_simple.get_calculator_docstring(calculator_name)\n    model = config.require(\"llm.model\")\n\n    # Check if scoring system (needs medical reasoning first)\n    is_scoring = any(kw in calculator_name.lower() for kw in [\n        'score', 'criteria', 'index', 'risk', 'cha2ds2', 'heart', 'wells',\n        'curb', 'sofa', 'apache', 'child-pugh', 'meld', 'centor', 'fever',\n        'has-bled', 'rcri', 'charlson', 'caprini', 'blatchford', 'perc'\n    ])\n\n    reasoning_context = \"\"\n    if is_scoring:\n        reasoning_prompt = f\"\"\"You are a medical expert analyzing a patient note for the {calculator_name}.\n\nPATIENT NOTE:\n{patient_note}\n\nTASK: Identify ALL conditions/criteria relevant to this calculator.\nLook for both explicit mentions AND clinical findings that imply conditions.\n\nReturn JSON:\n{{\"reasoning\": \"step-by-step analysis\", \"conditions_present\": [\"list\"], \"conditions_absent\": [\"list\"], \"demographics\": {{\"age\": number, \"sex\": \"male/female\"}}}}\n\"\"\"\n        try:\n            reasoning_response, _ = llm(reasoning_prompt, model)\n            try:\n                reasoning_result = json.loads(reasoning_response)\n            except json.JSONDecodeError:\n                match = re.search(r'\\{[\\s\\S]*\\}', reasoning_response, re.DOTALL)\n                reasoning_result = json.loads(match.group()) if match else {}\n\n            conditions_present = reasoning_result.get(\"conditions_present\", [])\n            conditions_absent = reasoning_result.get(\"conditions_absent\", [])\n            demographics = reasoning_result.get(\"demographics\", {})\n\n            reasoning_context = f\"\"\"\nMEDICAL ANALYSIS (from reasoning stage):\n- Conditions PRESENT: {', '.join(conditions_present) if conditions_present else 'None'}\n- Conditions ABSENT: {', '.join(conditions_absent) if conditions_absent else 'None'}\n- Demographics: Age={demographics.get('age', 'unknown')}, Sex={demographics.get('sex', 'unknown')}\n\"\"\"\n        except Exception:\n            pass\n\n    # Build explicit field list so the LLM knows exactly what to return\n    all_fields = required_values + optional_values\n    field_list = ', '.join(f'\"{f}\"' for f in all_fields) if all_fields else '(see calculator description)'\n\n    # Stage 2: Structured extraction\n    extraction_prompt = f\"\"\"Extract values from the patient note for the {calculator_name} calculator.\n{reasoning_context}\nCALCULATOR DESCRIPTION:\n{docstring or 'No description available.'}\n\nPATIENT NOTE:\n{patient_note}\n\nYou MUST return values for these exact parameter names: [{field_list}]\n\nINSTRUCTIONS:\n- Use the EXACT parameter names listed above as JSON keys\n- Read the calculator description carefully for what each parameter means\n- For score/grade parameters (e.g. \"temperature_score\", \"ascites_grade\"):\n  map clinical findings to the numeric score described in the calculator description\n- Extract numeric values with proper units (age in years, weight in kg, height in cm)\n- Convert units as needed (lbs\u2192kg: \u00d70.453592, feet/inches\u2192cm)\n- For sex: \"man\"/\"male\"/\"he\" \u2192 \"male\", \"woman\"/\"female\"/\"she\" \u2192 \"female\"\n- For boolean conditions: True if present, False if absent\n- If a condition is not mentioned, assume it is absent (False or 0)\n\nReturn ONLY valid JSON:\n{{\"extracted\": {{\"param_name\": value, ...}}, \"missing\": [\"values truly not determinable from note\"]}}\n\"\"\"\n    try:\n        response, _ = llm(extraction_prompt, model)\n        try:\n            result = json.loads(response)\n        except json.JSONDecodeError:\n            match = re.search(r'\\{[\\s\\S]*\\}', response, re.DOTALL)\n            result = json.loads(match.group()) if match else {\"extracted\": {}, \"missing\": required_values}\n        return result.get(\"extracted\", {})\n    except Exception:\n        return {}\n\n\ndef _validate_extracted_values(\n    extracted: dict, calculator_name: str\n) -> tuple[bool, list[str], dict]:\n    \"\"\"Validate and clean extracted values.\"\"\"\n    import calculator_simple\n\n    # Flatten nested dicts\n    flattened = {}\n    for key, value in extracted.items():\n        if isinstance(value, dict):\n            for subkey, subvalue in value.items():\n                flattened[subkey] = subvalue\n        else:\n            flattened[key] = value\n\n    # Normalize boolean-like values\n    cleaned = {}\n    for key, value in flattened.items():\n        if isinstance(value, str):\n            val_lower = value.lower().strip()\n            if val_lower in (\"true\", \"yes\", \"1\", \"present\", \"positive\"):\n                cleaned[key] = True\n            elif val_lower in (\"false\", \"no\", \"0\", \"absent\", \"negative\"):\n                cleaned[key] = False\n            else:\n                try:\n                    cleaned[key] = float(value)\n                except ValueError:\n                    cleaned[key] = value.strip()\n        elif value is not None:\n            cleaned[key] = value\n\n    signatures = calculator_simple.get_calculator_signatures()\n    sig = signatures.get(calculator_name, {})\n    required = sig.get(\"required\", [])\n    optional = sig.get(\"optional\", [])\n\n    missing = [v for v in required if v not in cleaned or cleaned[v] is None]\n\n    # Route scoring calculators to reasoning fallback when extraction is\n    # unreliable: (a) >=4 optional boolean criteria where extraction\n    # frequently gets conditions wrong, or (b) optional fields exist but\n    # none were extracted (calculator runs entirely on defaults).\n    if not missing and optional:\n        extracted_optional = sum(1 for v in optional if v in cleaned)\n        if len(optional) >= 4 or extracted_optional == 0:\n            missing = [v for v in optional if v not in cleaned]\n\n    return len(missing) == 0, missing, cleaned\n\n\ndef _repair_extraction(\n    patient_note: str, calculator_name: str,\n    current_values: dict, missing: list[str],\n) -> dict:\n    \"\"\"Re-prompt LLM for missing values.\"\"\"\n    import calculator_simple\n    model = config.require(\"llm.model\")\n    docstring = calculator_simple.get_calculator_docstring(calculator_name)\n\n    repair_prompt = f\"\"\"Previous extraction was incomplete for {calculator_name}.\n\nMISSING REQUIRED VALUES: {', '.join(missing)}\nALREADY EXTRACTED: {current_values}\n\nCALCULATOR DESCRIPTION:\n{docstring or 'No description available.'}\n\nPATIENT NOTE:\n{patient_note}\n\nFind the missing values. For sex: infer from pronouns (he\u2192male, she\u2192female).\nReturn ONLY JSON: {{\"extracted\": {{\"value_name\": value, ...}}}}\n\"\"\"\n    try:\n        response, _ = llm(repair_prompt, model)\n        try:\n            parsed = json.loads(response)\n        except json.JSONDecodeError:\n            match = re.search(r'\\{[\\s\\S]*\\}', response, re.DOTALL)\n            parsed = json.loads(match.group()) if match else {\"extracted\": {}}\n        new_extracted = parsed.get(\"extracted\", {})\n        return {**current_values, **new_extracted}\n    except Exception:\n        return current_values\n\n```\n\n## Performance on training set\n\nPipeline accuracy: 80.0%, avg cost: $0.0004/case, 110 cases\n\nPer-ptool breakdown:\n  identify_calculator: cost_frac=100.0%, calls/case=1.0, avg_cost=$0.0005, lift=N/A, errors=0\n\nPtools called via LLM: ['identify_calculator']\n\nHeld-out eval accuracy: 73.6% (train: 80.0%)\nA large train-eval gap means your changes are OVERFITTING. Prefer changes that generalize to unseen cases.\n\n## Failure cases with full context\n\nTotal failures: 22 / showing 22:\n\nFailure counts by category:\n  CHA2DS2-VASc Score for Atrial Fibrillation Stroke Risk: 2 failures\n  Glasgow-Blatchford Bleeding Score (GBS): 1 failures\n  Wells' Criteria for Pulmonary Embolism: 1 failures\n  Centor Score (Modified/McIsaac) for Strep Pharyngitis: 1 f kflow: try PoT code generation, fallback to simulate\n# =============================================================================\n\ndef pot_workflow(patient_note: str, question: str) -> float:\n    \"\"\"L3 workflow: try Program of Thought, fallback to reasoning.\n\n    PoT generates Python code calling tool interfaces. If the code\n    execution fails or returns None/NaN, fall back to chain-of-thought.\n    \"\"\"\n    import math\n\n    try:\n        result = pot_medical_value(patient_note, question)\n        if result is not None and not (isinstance(result, float) and math.isnan(result)):\n            return result\n    except Exception:\n        pass\n\n    return _reasoning_fallback(patient_note, question)\n\n\n# =============================================================================\n# L2 workflow: try Python calculator, fallback to simulate\n# =============================================================================\n\ndef distilled_workflow(patient_note: str, question: str) -> float:\n    \"\"\"L2 workflow: try Python extraction + calculation, fallback to LLM simulate.\n\n    This implements the 'distilled' approach:\n    1. Try to identify the calculator from the question using Python pattern matching\n    2. Try to extract values from the patient note using Python regex\n    3. If Python succeeds, compute the result directly (zero LLM cost)\n    4. If Python fails at any step, fallback to simulate_medical_value (LLM)\n    \"\"\"\n    from calculators import calculate\n\n    # Try pure Python first\n    result = calculate(patient_note, question)\n    if result is not None and result.result is not None:\n        return result.result\n\n    # Fallback to LLM\n    return simulate_medical_value(patient_note, question)\n\n\n# =============================================================================\n# L4 workflow: Python-orchestrated pipeline with specialist LLM stages\n# ======================================================================== 2 direct workflow: try Python, fallback to simulate helper\n  L3 (PoT)        \u2192 program_of_thought with tool interfaces\n  L4 (pipeline)   \u2192 direct workflow calling sub-interfaces for extraction + Python compute\n\"\"\"\n\nimport inspect\nimport json\nimport re\nfrom typing import Any, Dict, List, Optional\n\nfrom secretagent.core import interface\nfrom secretagent import config\nfrom secretagent.llm_util import llm\n\n\n# =============================================================================\n# Formula reference (dynamically extracted from calculator_simple.py)\n# =============================================================================\n\ndef get_formula_reference() -> str:\n    \"\"\"Extract formulas from calculator_simple.py at import time.\"\"\"\n    import calculator_simple\n\n    formulas = {}\n    for name, spec in calculator_simple.CALCULATOR_REGISTRY.items():\n        if spec.name not in formulas and spec.formula:\n            formulas[spec.name] = spec.formula\n\n    lines = [\"FORMULAS (use these exact formulas):\"]\n    for name, formula in sorted(formulas.items()):\n        lines.append(f\"- {name}: {formula}\")\n    return \"\\n\".join(lines)\n\n\nFORMULA_REFERENCE = get_formula_reference()\n\n\n# =============================================================================\n# Generate L0 baseline prompt template (same formulas, direct framing)\n# =============================================================================\n\n_BASELINE_TEMPLATE = f\"\"\"You are a medical calculation assistant.\n\n{FORMULA_REFERENCE}\n\nPatient Note:\n$patient_note\n\nQuestion: $question\n\nInstructions:\n1. Read the patient note carefully\n2. Extract the relevant values needed for the calculation\n3. Perform the calculation step by step\n4. Provide your final numeric answer\n\nShow your reasoning, then give the final answer as:\nANSWER: <number>\"\"\"\n\n# Write at import time so prompt_llm can load it from file\nfrom pathlib import Path as _Path\n(_Path(__file__).parent / 'prompt_templates' / 'baseline.txt').write_text(\n    _BASELINE_TEMPLATE)\n\n\n# =============================================================================\n# Main entry-point interface (all levels evaluate this)\n# =============================================================================\n\n_CALCULATE_DOCSTRING = f\"\"\"Calculate a medical value from a patient note.\n\nGiven a patient note and a calculation question:\n1. Carefully read the patient note to extract all relevant clinical values\n2. Identify what medical calculation/score is needed\n3. Apply the appropriate formula from the reference below\n4. Show your calculation step by step\n\n{FORMULA_REFERENCE}\n\nImportant: Be precise with extracted values. Double-check your arithmetic.\nFor sex/gender: \"man\"/\"male\"/\"he\" \u2192 male, \"woman\"/\"female\"/\"she\" \u2192 female.\nConvert units as needed (lbs\u2192kg: \u00d70.453592, feet/inches\u2192cm: (ft\u00d712+in)\u00d72.54).\n\nReturn ONLY the final numeric answer.\n\nExamples:\n>>> calculate_medical_value(\"A 70-year-old male weighing 80 kg, height 175 cm.\", \"What is the patient's BMI?\")\n26.122\n>>> calculate_medical_value(\"A 65-year-old female, BP 130/85 mmHg.\", \"What is the patient's Mean Arterial Pressure (MAP)?\")\n100.0\n\"\"\"\n\n\ndef _build_medical_value_src(func_name: str, docstring: str) -> str:\n    \"\"\"Build a synthetic source string with the docstring embedded.\"\"\"\n    # Indent the docstring for Python source\n    doc_lines = docstring.strip().split('\\n')\n    indented = '\\n'.join('    ' + line for line in doc_lines)\n    return (\n        f'def {func_name}(patient_note: str, question: str) -> float:\\n'\n        f'    \"\"\"{doc_lines[0]}\\n'\n        f'\\n{indented}\\n'\n        f'    \"\"\"\\n'\n        f'    ...\\n'\n    )\n\n\ndef calculate_medical_value(patient_note: str, question: str) -> float:\n    ...\n\ncalculate_medical_value.__doc__ = _CALCULATE_DOCSTRING\ncalculate_medical_value = interface(calculate_medical_value)\ncalculate_medical_value.src = _build_medical_value_src(\n    'calculate_medical_value', _CALCULATE_DOCSTRING)\n\n\n# =============================================================================\n# L2 helper: simulate fallback for distilled workflow\n# =============================================================================\n\ndef simulate_medical_value(patient_note: str, question: str) -> float:\n    ...\n\nsimulate_medical_value.__doc__ = _CALCULATE_DOCSTRING\nsimulate_medical_value = interface(simulate_medical_value)\nsimulate_medical_value.src = _build_medical_value_src(\n    'simulate_medical_value', _CALCULATE_DOCSTRING)\n\n\n# =============================================================================\n# L3/L4 sub-interfaces\n# =============================================================================\n\n@interface\ndef identify_calculator(question: str, available_calculators: list[str]) -> dict:\n    \"\"\"Identify which medical calculator is needed based on the question.\n\n    Analyze the question and match it to one of the available calculators.\n\n    Return a dict with:\n    - \"calculator_name\": exact name from the available list\n    - \"confidence\": 0.0-1.0 confidence score\n    - \"reasoning\": brief explanation\n\n    Examples:\n    >>> identify_calculator(\"What is the patient's BMI?\", [\"Body Mass Index (BMI)\", \"Ideal Body Weight (Devine)\"])\n    {'calculator_name': 'Body Mass Index (BMI)', 'confidence': 0.99, 'reasoning': 'BMI directly asked'}\n    \"\"\"\n    ...\n\n\n@interface\ndef extract_clinical_values(patient_note: str, required_values: list[str]) -> dict:\n    \"\"\"Extract specific clinical values from a patient note.\n\n    Given the patient note and list of required values, find and extract each one.\n    Convert all values to standard units (kg for weight, cm for height, etc.).\n\n    IMPORTANT for sex/gender:\n    - \"man\", \"male\", \"he\", \"his\" \u2192 sex = \"male\"\n    - \"woman\", \"female\", \"she\", \"her\" \u2192 sex = \"female\"\n\n    Return a dict with:\n    - \"extracted\": {\"value_name\": numeric_value, ...}\n    - \"missing\": [\"list of values not found\"]\n\n    Examples:\n    >>> extract_clinical_values(\"A 70-year-old male weighing 80 kg, height 175 cm, creatinine 1.2 mg/dL.\", [\"age\", \"sex\", \"weight_kg\", \"height_cm\", \"creatinine_mg_dl\"])\n    {'extracted': {'age': 70, 'sex': 'male', 'weight_kg': 80, 'height_cm': 175, 'creatinine_mg_dl': 1.2}, 'missing': []}\n    \"\"\"\n    ...\n\n\n@interface\ndef compute_calculation(calculator_name: str, values: dict) -> dict:\n    \"\"\"Compute a medical calculation using pre-extracted values.\n\n    Uses verified Python implementations for all 55 medical calculators.\n    This tool is deterministic and accurate.\n\n    Args:\n        calculator_name: The exact calculator name\n        values: Dictionary of parameter names to values\n\n    Returns:\n        {\"calculator_name\": str, \"result\": numeric_answer, \"formula_used\": str}\n        OR {\"error\": str, \"result\": None} if calculation fails\n\n    Examples:\n    >>> compute_calculation(\"Body Mass Index (BMI)\", {\"weight_kg\": 80, \"height_cm\": 175})\n    {'calculator_name': 'Body Mass Index (BMI)', 'result': 26.122, 'formula_used': 'BMI = weight_kg / (height_m)^2'}\n    \"\"\"\n    ...\n\n\n# =============================================================================\n# Chain-of-thought reasoning fallback (reusable by any workflow)\n# =============================================================================\n\ndef _reasoning_fallback(patient_note: str, question: str) -> float:\n    \"\"\"Ask the LLM to reason step-by-step, then extract the numeric answer.\n\n    Uses the same formula-rich prompt as the L0 baseline.  Unlike\n    ``simulate`` (which predicts a bare number), this lets the LLM show\n    its work \u2014 critical for complex scoring systems where holistic\n    reasoning outperforms structured extraction.\n    \"\"\"\n    from string import Template\n\n    model = config.require(\"llm.model\")\n    prompt = Template(_BASELINE_TEMPLATE).safe_substitute(\n        patient_note=patient_note, question=question)\n    response, _ = llm(prompt, model)\n\n    # Extract structured outputs (gestational age, dates) before numeric\n    if \"weeks\" in question.lower() and \"days\" in question.lower():\n        match_ga = re.search(r'\\(?(\\d+)\\s*weeks?[,\\s]+(\\d+)\\s*days?\\)?',\n                             response, re.IGNORECASE)\n        if match_ga:\n            return (f\"{match_ga.group(1)} weeks\", f\"{match_ga.group(2)} days\")\n\n    if \"date\" in question.lower():\n        dates = re.findall(r'\\b(\\d{2}/\\d{2}/\\d{4})\\b', response)\n        if dates:\n            return dates[-1]\n\n    # Extract number: try ANSWER/RESULT/SCORE pattern first (case-insensitive)\n    match = re.search(\n        r'(?i)(?:ANSWER|RESULT|FINAL ANSWER|SCORE|VALUE)[:\\s]*([-\\d.eE+]+)',\n        response)\n    if match:\n        try:\n            return float(match.group(1))\n        except ValueError:\n            pass\n    # Fallback to last number in text\n    numbers = re.findall(r'-?\\d+\\.?\\d*', response)\n    if numbers:\n        try:\n            return float(numbers[-1])\n        except ValueError:\n            pass\n    # Final fallback to simulate\n    return simulate_medical_value(patient_note, question)\n\n\n# =============================================================================\n# Direct implementations\n# =============================================================================\n\ndef compute_calculation_impl(calculator_name: str, values: dict) -> dict:\n    \"\"\"Direct Python implementation for compute_calculation.\"\"\"\n    from calculators import compute_direct\n\n    result = compute_direct(calculator_name, values)\n    if result is None:\n        return {\n            \"error\": f\"Calculation failed for {calculator_name} with values {values}\",\n            \"result\": None,\n            \"calculator_name\": calculator_name,\n        }\n    return {\n        \"calculator_name\": result.calculator_name,\n        \"result\": result.result,\n        \"extracted_values\": result.extracted_values,\n        \"formula_used\": result.formula_used,\n    }\n\n\n# =============================================================================\n# L3 helper: PoT sub-interface (bound to program_of_thought via config)\n# =============================================================================\n\ndef pot_medical_value(patient_note: str, question: str) -> float:\n    ...\n\npot_medical_value.__doc__ = _CALCULATE_DOCSTRING\npot_medical_value = interface(pot_medical_value)\npot_medical_value.src = _build_medical_value_src(\n    'pot_medical_value', _CALCULATE_DOCSTRING)\n\n\n# =============================================================================\n# L3 workflow: try PoT code generation, fallback to simulate\n# =============================================================================\n\ndef pot_workflow(patient_note: str, question: str) -> float:\n    \"\"\"L3 workflow: try Program of Thought, fallback to reasoning.\n\n    PoT generates Python code calling tool interfaces. If the code\n    execution fails or returns None/NaN, fall back to chain-of-thought.\n    \"\"\"\n    import math\n\n    try:\n        result = pot_medical_value(patient_note, question)\n        if result is not None and not (isinstance(result, float) and math.isnan(result)):\n            return result\n    except Exception:\n        pass\n\n    return _reasoning_fallback(patient_note, question)\n\n\n# =============================================================================\n# L2 workflow: try Python calculator, fallback to simulate\n# =============================================================================\n\ndef distilled_workflow(patient_note: str, question: str) -> float:\n    \"\"\"L2 workflow: try Python extraction + calculation, fallback to LLM simulate.\n\n    This implements the 'distilled' approach:\n    1. Try to identify the calculator from the question using Python pattern matching\n    2. Try to extract values from the patient note using Python regex\n    3. If Python succeeds, compute the result directly (zero LLM cost)\n    4. If Python fails at any step, fallback to simulate_medical_value (LLM)\n    \"\"\"\n    from calculators import calculate\n\n    # Try pure Python first\n    result = calculate(patient_note, question)\n    if result is not None and result.result is not None:\n        return result.result\n\n    # Fallback to LLM\n    return simulate_medical_value(patient_note, question)\n\n\n# =============================================================================\n# L4 workflow: Python-orchestrated pipeline with specialist LLM stages\n# =============================================================================\n\ndef _build_descriptive_fields(calc_name: str) -> list[str]:\n    \"\"\"Build descriptive field names from calculator docstring.\n\n    Turns bare field names (e.g. 'ascites_grade') into descriptive\n    strings (e.g. 'ascites_grade: 0=none, 1=mild/controlled, 2=moderate-severe')\n    so that extract_clinical_values knows what to look for.\n    \"\"\"\n    import calculator_simple\n    doc = calculator_simple.get_calculator_docstring(calc_name) or ''\n    sigs = calculator_simple.get_calculator_signatures()\n    sig = sigs.get(calc_name, {})\n    all_fields = sig.get('required', []) + sig.get('optional', [])\n\n    # Parse \"field_name: description\" lines from docstring\n    field_desc = {}\n    for line in doc.split('\\n'):\n        line = line.strip()\n        # Match lines like \"    bilirubin: Total bilirubin in mg/dL (e.g., 2.5)\"\n        match = re.match(r'(\\w+):\\s+(.+)', line)\n        if match and match.group(1) in all_fields:\n            field_desc[match.group(1)] = match.group(2).strip()\n\n    result = []\n    for f in all_fields:\n        if f in field_desc:\n            result.append(f'{f}: {field_desc[f]}')\n        else:\n            result.append(f)\n    return result\n\n\ndef workflow(patient_note: str, question: str) -> float:\n    \"\"\"L4 workflow: Python-orchestrated with ptools interfaces + LLM extraction.\n\n    Pipeline:\n    1. identify_calculator (ptools) \u2014 LLM identifies which calculator\n    2. _extract_values_two_stage   \u2014 LLM extraction with calculator-specific context\n    3. compute_calculation (ptools) \u2014 Python computes result deterministically\n    Fallback: chain-of-thought reasoning for scoring or failed extraction\n    \"\"\"\n    import calculator_simple\n    from calculators import identify_calculator as python_identify\n\n    signatures = calculator_simple.get_calculator_signatures()\n    available = list(signatures.keys())\n\n    # ---- Stage 1: identify_calculator (ptools interface) ----\n    calc_name = None\n    try:\n        result = identify_calculator(question, available)\n        if isinstance(result, dict):\n            calc_name = result.get(\"calculator_name\")\n            if calc_name and calc_name not in signatures:\n                calc_lower = calc_name.lower()\n                for sig_name in signatures:\n                    if calc_lower in sig_name.lower() or sig_name.lower() in calc_lower:\n                        calc_name = sig_name\n                        break\n                else:\n                    calc_name = None\n    except Exception:\n        pass\n\n    # Python fallback for identification\n    if not calc_name:\n        pattern = python_identify(question)\n        if pattern:\n            for name, spec in calculator_simple.CALCULATOR_REGISTRY.items():\n                if isinstance(spec, calculator_simple.CalculatorSpec):\n                    if pattern.lower() in spec.name.lower():\n                        calc_name = spec.name\n                        break\n\n    if not calc_name:\n        return _reasoning_fallback(patient_note, question)\n\n    # ---- Stage 2: Extract values (LLM with calculator-specific context) ----\n    sig = signatures.get(calc_name, {})\n    required = sig.get(\"required\", [])\n    optional = sig.get(\"optional\", [])\n\n    extracted = _extract_values_two_stage(\n        patient_note, calc_name, required, optional\n    )\n\n    # ---- Stage 3: Validate + compute_calculation (ptools interface) ----\n    is_valid, missing, cleaned = _validate_extracted_values(extracted, calc_name)\n\n    if missing and not is_valid:\n        repaired = _repair_extraction(patient_note, calc_name, cleaned, missing)\n        is_valid, missing, cleaned = _validate_extracted_values(repaired, calc_name)\n\n    if is_valid:\n        try:\n            result = compute_calculation(calc_name, cleaned)\n            if isinstance(result, dict) and result.get('result') is not None:\n                return result['result']\n        except Exception:\n            pass\n\n    # Fallback: chain-of-thought reasoning\n    return _reasoning_fallback(patient_note, question)\n\n# backward compat alias\npipeline_workflow = workflow\n\n\n# =============================================================================\n# L4 helper functions (inline LLM calls for extraction pipeline)\n# =============================================================================\n\ndef _extract_values_two_stage(\n    patient_note: str,\n    calculator_name: str,\n    required_values: list[str],\n    optional_values: list[str],\n) -> dict:\n    \"\"\"Two-stage extraction: medical reasoning \u2192 structured extraction.\"\"\"\n    import calculator_simple\n\n    docstring = calculator_simple.get_calculator_docstring(calculator_name)\n    model = config.require(\"llm.model\")\n\n    # Check if scoring system (needs medical reasoning first)\n    is_scoring = any(kw in calculator_name.lower() for kw in [\n        'score', 'criteria', 'index', 'risk', 'cha2ds2', 'heart', 'wells',\n        'curb', 'sofa', 'apache n3. What is the MINIMAL change that fixes this pattern?\n4. Why will this change NOT break currently working cases?\n</reasoning>\n\n<ptools_file>\n# Complete modified ptools_evolved.py here\n</ptools_file>\n\n<config>\n# Optional dotlist config overrides (e.g. model switches), one per line\n</config>\n", "supervisor_response": "<reasoning>\n1. What SPECIFIC failure pattern did you identify?\nIn the `Estimated Due Date` and `Estimated of Conception` date calculators, the correct answer is generated by the Python computation module as a `datetime.date` object. However, when it is returned directly by the workflow without formatting, the evaluation framework (which expects a specific \"MM/DD/YYYY\" string format for date questions) fails to match it perfectly or treats it as an invalid float fallback, leading to errors despite the logic being correct.\n\n2. How many of the shown failures share this pattern?\nAt least 2 explicit date computation cases (`train.9100`, `train.9313`) show failures where the pipeline should have trivially succeeded with the deterministic math, indicating a format serialization gap between the python tool and the expected textual output.\n\n3. What is the MINIMAL change that fixes this pattern?\nIn the L4 `workflow` function, right before returning `result['result']` from the successful `compute_calculation` step, intercept any output that is a `datetime.date` or `datetime.datetime` object and explicitly format it into the expected `'%m/%d/%Y'` string.\n\n4. Why will this change NOT break currently working cases?\nThis is extremely safe because it ONLY applies when the underlying Python calculator explicitly returns a `datetime` object. It does not touch numeric float returns, strings, or tuples (which remain untouched). It purely resolves a data-type mismatch for date calculators without changing any prompt logic or validation flows.\n</reasoning>\n\n<ptools_file>\n\"\"\"MedCalc-Bench interface definitions and workflow functions.\n\nDefines the secretagent interfaces used across all experiment levels (L0\u2013L4).\nEach level binds a different implementation to `calculate_medical_value` via config.\n\nLevel mapping:\n  L0 (baseline)   \u2192 prompt_llm with template file\n  L1 (simulate)   \u2192 simulate with rich docstring + formula reference\n  L2 (distilled)  \u2192 direct workflow: try Python, fallback to simulate helper\n  L3 (PoT)        \u2192 program_of_thought with tool interfaces\n  L4 (pipeline)   \u2192 direct workflow calling sub-interfaces for extraction + Python compute\n\"\"\"\n\nimport inspect\nimport json\nimport re\nfrom typing import Any, Dict, List, Optional\n\nfrom secretagent.core import interface\nfrom secretagent import config\nfrom secretagent.llm_util import llm\n\n\n# =============================================================================\n# Formula reference (dynamically extracted from calculator_simple.py)\n# =============================================================================\n\ndef get_formula_reference() -> str:\n    \"\"\"Extract formulas from calculator_simple.py at import time.\"\"\"\n    import calculator_simple\n\n    formulas = {}\n    for name, spec in calculator_simple.CALCULATOR_REGISTRY.items():\n        if spec.name not in formulas and spec.formula:\n            formulas[spec.name] = spec.formula\n\n    lines = [\"FORMULAS (use these exact formulas):\"]\n    for name, formula in sorted(formulas.items()):\n        lines.append(f\"- {name}: {formula}\")\n    return \"\\n\".join(lines)\n\n\nFORMULA_REFERENCE = get_formula_reference()\n\n\n# =============================================================================\n# Generate L0 baseline prompt template (same formulas, direct framing)\n# =============================================================================\n\n_BASELINE_TEMPLATE = f\"\"\"You are a medical calculation assistant.\n\n{FORMULA_REFERENCE}\n\nPatient Note:\n$patient_note\n\nQuestion: $question\n\nInstructions:\n1. Read the patient note carefully\n2. Extract the relevant values needed for the calculation\n3. Perform the calculation step by step\n4. Provide your final numeric answer\n\nShow your reasoning, then give the final answer as:\nANSWER: <number>\"\"\"\n\n# Write at import time so prompt_llm can load it from file\nfrom pathlib import Path as _Path\n(_Path(__file__).parent / 'prompt_templates' / 'baseline.txt').write_text(\n    _BASELINE_TEMPLATE)\n\n\n# =============================================================================\n# Main entry-point interface (all levels evaluate this)\n# =============================================================================\n\n_CALCULATE_DOCSTRING = f\"\"\"Calculate a medical value from a patient note.\n\nGiven a patient note and a calculation question:\n1. Carefully read the patient note to extract all relevant clinical values\n2. Identify what medical calculation/score is needed\n3. Apply the appropriate formula from the reference below\n4. Show your calculation step by step\n\n{FORMULA_REFERENCE}\n\nImportant: Be precise with extracted values. Double-check your arithmetic.\nFor sex/gender: \"man\"/\"male\"/\"he\" \u2192 male, \"woman\"/\"female\"/\"she\" \u2192 female.\nConvert units as needed (lbs\u2192kg: \u00d70.453592, feet/inches\u2192cm: (ft\u00d712+in)\u00d72.54).\n\nReturn ONLY the final numeric answer.\n\nExamples:\n>>> calculate_medical_value(\"A 70-year-old male weighing 80 kg, height 175 cm.\", \"What is the patient's BMI?\")\n26.122\n>>> calculate_medical_value(\"A 65-year-old female, BP 130/85 mmHg.\", \"What is the patient's Mean Arterial Pressure (MAP)?\")\n100.0\n\"\"\"\n\n\ndef _build_medical_value_src(func_name: str, docstring: str) -> str:\n    \"\"\"Build a synthetic source string with the docstring embedded.\"\"\"\n    # Indent the docstring for Python source\n    doc_lines = docstring.strip().split('\\n')\n    indented = '\\n'.join('    ' + line for line in doc_lines)\n    return (\n        f'def {func_name}(patient_note: str, question: str) -> float:\\n'\n        f'    \"\"\"{doc_lines[0]}\\n'\n        f'\\n{indented}\\n'\n        f'    \"\"\"\\n'\n        f'    ...\\n'\n    )\n\n\ndef calculate_medical_value(patient_note: str, question: str) -> float:\n    ...\n\ncalculate_medical_value.__doc__ = _CALCULATE_DOCSTRING\ncalculate_medical_value = interface(calculate_medical_value)\ncalculate_medical_value.src = _build_medical_value_src(\n    'calculate_medical_value', _CALCULATE_DOCSTRING)\n\n\n# =============================================================================\n# L2 helper: simulate fallback for distilled workflow\n# =============================================================================\n\ndef simulate_medical_value(patient_note: str, question: str) -> float:\n    ...\n\nsimulate_medical_value.__doc__ = _CALCULATE_DOCSTRING\nsimulate_medical_value = interface(simulate_medical_value)\nsimulate_medical_value.src = _build_medical_value_src(\n    'simulate_medical_value', _CALCULATE_DOCSTRING)\n\n\n# =============================================================================\n# L3/L4 sub-interfaces\n# =============================================================================\n\n@interface\ndef identify_calculator(question: str, available_calculators: list[str]) -> dict:\n    \"\"\"Identify which medical calculator is needed based on the question.\n\n    Analyze the question and match it to one of the available calculators.\n\n    Return a dict with:\n    - \"calculator_name\": exact name from the available list\n    - \"confidence\": 0.0-1.0 confidence score\n    - \"reasoning\": brief explanation\n\n    Examples:\n    >>> identify_calculator(\"What is the patient's BMI?\", [\"Body Mass Index (BMI)\", \"Ideal Body Weight (Devine)\"])\n    {'calculator_name': 'Body Mass Index (BMI)', 'confidence': 0.99, 'reasoning': 'BMI directly asked'}\n    \"\"\"\n    ...\n\n\n@interface\ndef extract_clinical_values(patient_note: str, required_values: list[str]) -> dict:\n    \"\"\"Extract specific clinical values from a patient note.\n\n    Given the patient note and list of required values, find and extract each one.\n    Convert all values to standard units (kg for weight, cm for height, etc.).\n\n    IMPORTANT for sex/gender:\n    - \"man\", \"male\", \"he\", \"his\" \u2192 sex = \"male\"\n    - \"woman\", \"female\", \"she\", \"her\" \u2192 sex = \"female\"\n\n    Return a dict with:\n    - \"extracted\": {\"value_name\": numeric_value, ...}\n    - \"missing\": [\"list of values not found\"]\n\n    Examples:\n    >>> extract_clinical_values(\"A 70-year-old male weighing 80 kg, height 175 cm, creatinine 1.2 mg/dL.\", [\"age\", \"sex\", \"weight_kg\", \"height_cm\", \"creatinine_mg_dl\"])\n    {'extracted': {'age': 70, 'sex': 'male', 'weight_kg': 80, 'height_cm': 175, 'creatinine_mg_dl': 1.2}, 'missing': []}\n    \"\"\"\n    ...\n\n\n@interface\ndef compute_calculation(calculator_name: str, values: dict) -> dict:\n    \"\"\"Compute a medical calculation using pre-extracted values.\n\n    Uses verified Python implementations for all 55 medical calculators.\n    This tool is deterministic and accurate.\n\n    Args:\n        calculator_name: The exact calculator name\n        values: Dictionary of parameter names to values\n\n    Returns:\n        {\"calculator_name\": str, \"result\": numeric_answer, \"formula_used\": str}\n        OR {\"error\": str, \"result\": None} if calculation fails\n\n    Examples:\n    >>> compute_calculation(\"Body Mass Index (BMI)\", {\"weight_kg\": 80, \"height_cm\": 175})\n    {'calculator_name': 'Body Mass Index (BMI)', 'result': 26.122, 'formula_used': 'BMI = weight_kg / (height_m)^2'}\n    \"\"\"\n    ...\n\n\n# =============================================================================\n# Chain-of-thought reasoning fallback (reusable by any workflow)\n# =============================================================================\n\ndef _reasoning_fallback(patient_note: str, question: str) -> float:\n    \"\"\"Ask the LLM to reason step-by-step, then extract the numeric answer.\n\n    Uses the same formula-rich prompt as the L0 baseline.  Unlike\n    ``simulate`` (which predicts a bare number), this lets the LLM show\n    its work \u2014 critical for complex scoring systems where holistic\n    reasoning outperforms structured extraction.\n    \"\"\"\n    from string import Template\n\n    model = config.require(\"llm.model\")\n    prompt = Template(_BASELINE_TEMPLATE).safe_substitute(\n        patient_note=patient_note, question=question)\n    response, _ = llm(prompt, model)\n\n    # Extract structured outputs (gestational age, dates) before numeric\n    if \"weeks\" in question.lower() and \"days\" in question.lower():\n        match_ga = re.search(r'\\(?(\\d+)\\s*weeks?[,\\s]+(\\d+)\\s*days?\\)?',\n                             response, re.IGNORECASE)\n        if match_ga:\n            return (f\"{match_ga.group(1)} weeks\", f\"{match_ga.group(2)} days\")\n\n    if \"date\" in question.lower():\n        dates = re.findall(r'\\b(\\d{2}/\\d{2}/\\d{4})\\b', response)\n        if dates:\n            return dates[-1]\n\n    # Extract number: try ANSWER/RESULT/SCORE pattern first (case-insensitive)\n    match = re.search(\n        r'(?i)(?:ANSWER|RESULT|FINAL ANSWER|SCORE|VALUE)[:\\s]*([-\\d.eE+]+)',\n        response)\n    if match:\n        try:\n            return float(match.group(1))\n        except ValueError:\n            pass\n    # Fallback to last number in text\n    numbers = re.findall(r'-?\\d+\\.?\\d*', response)\n    if numbers:\n        try:\n            return float(numbers[-1])\n        except ValueError:\n            pass\n    # Final fallback to simulate\n    return simulate_medical_value(patient_note, question)\n\n\n# =============================================================================\n# Direct implementations\n# =============================================================================\n\ndef compute_calculation_impl(calculator_name: str, values: dict) -> dict:\n    \"\"\"Direct Python implementation for compute_calculation.\"\"\"\n    from calculators import compute_direct\n\n    result = compute_direct(calculator_name, values)\n    if result is None:\n        return {\n            \"error\": f\"Calculation failed for {calculator_name} with values {values}\",\n            \"result\": None,\n            \"calculator_name\": calculator_name,\n        }\n    return {\n        \"calculator_name\": result.calculator_name,\n        \"result\": result.result,\n        \"extracted_values\": result.extracted_values,\n        \"formula_used\": result.formula_used,\n    }\n\n\n# =============================================================================\n# L3 helper: PoT sub-interface (bound to program_of_thought via config)\n# =============================================================================\n\ndef pot_medical_value(patient_note: str, question: str) -> float:\n    ...\n\npot_medical_value.__doc__ = _CALCULATE_DOCSTRING\npot_medical_value = interface(pot_medical_value)\npot_medical_value.src = _build_medical_value_src(\n    'pot_medical_value', _CALCULATE_DOCSTRING)\n\n\n# =============================================================================\n# L3 workflow: try PoT code generation, fallback to simulate\n# =============================================================================\n\ndef pot_workflow(patient_note: str, question: str) -> float:\n    \"\"\"L3 workflow: try Program of Thought, fallback to reasoning.\n\n    PoT generates Python code calling tool interfaces. If the code\n    execution fails or returns None/NaN, fall back to chain-of-thought.\n    \"\"\"\n    import math\n\n    try:\n        result = pot_medical_value(patient_note, question)\n        if result is not None and not (isinstance(result, float) and math.isnan(result)):\n            return result\n    except Exception:\n        pass\n\n    return _reasoning_fallback(patient_note, question)\n\n\n# =============================================================================\n# L2 workflow: try Python calculator, fallback to simulate\n# =============================================================================\n\ndef distilled_workflow(patient_note: str, question: str) -> float:\n    \"\"\"L2 workflow: try Python extraction + calculation, fallback to LLM simulate.\n\n    This implements the 'distilled' approach:\n    1. Try to identify the calculator from the question using Python pattern matching\n    2. Try to extract values from the patient note using Python regex\n    3. If Python succeeds, compute the result directly (zero LLM cost)\n    4. If Python fails at any step, fallback to simulate_medical_value (LLM)\n    \"\"\"\n    from calculators import calculate\n\n    # Try pure Python first\n    result = calculate(patient_note, question)\n    if result is not None and result.result is not None:\n        return result.result\n\n    # Fallback to LLM\n    return simulate_medical_value(patient_note, question)\n\n\n# =============================================================================\n# L4 workflow: Python-orchestrated pipeline with specialist LLM stages\n# =============================================================================\n\ndef _build_descriptive_fields(calc_name: str) -> list[str]:\n    \"\"\"Build descriptive field names from calculator docstring.\n\n    Turns bare field names (e.g. 'ascites_grade') into descriptive\n    strings (e.g. 'ascites_grade: 0=none, 1=mild/controlled, 2=moderate-severe')\n    so that extract_clinical_values knows what to look for.\n    \"\"\"\n    import calculator_simple\n    doc = calculator_simple.get_calculator_docstring(calc_name) or ''\n    sigs = calculator_simple.get_calculator_signatures()\n    sig = sigs.get(calc_name, {})\n    all_fields = sig.get('required', []) + sig.get('optional', [])\n\n    # Parse \"field_name: description\" lines from docstring\n    field_desc = {}\n    for line in doc.split('\\n'):\n        line = line.strip()\n        # Match lines like \"    bilirubin: Total bilirubin in mg/dL (e.g., 2.5)\"\n        match = re.match(r'(\\w+):\\s+(.+)', line)\n        if match and match.group(1) in all_fields:\n            field_desc[match.group(1)] = match.group(2).strip()\n\n    result = []\n    for f in all_fields:\n        if f in field_desc:\n            result.append(f'{f}: {field_desc[f]}')\n        else:\n            result.append(f)\n    return result\n\n\ndef workflow(patient_note: str, question: str) -> float:\n    \"\"\"L4 workflow: Python-orchestrated with ptools interfaces + LLM extraction.\n\n    Pipeline:\n    1. identify_calculator (ptools) \u2014 LLM identifies which calculator\n    2. _extract_values_two_stage   \u2014 LLM extraction with calculator-specific context\n    3. compute_calculation (ptools) \u2014 Python computes result deterministically\n    Fallback: chain-of-thought reasoning for scoring or failed extraction\n    \"\"\"\n    import calculator_simple\n    from calculators import identify_calculator as python_identify\n\n    signatures = calculator_simple.get_calculator_signatures()\n    available = list(signatures.keys())\n\n    # ---- Stage 1: identify_calculator (ptools interface) ----\n    calc_name = None\n    try:\n        result = identify_calculator(question, available)\n        if isinstance(result, dict):\n            calc_name = result.get(\"calculator_name\")\n            if calc_name and calc_name not in signatures:\n                calc_lower = calc_name.lower()\n                for sig_name in signatures:\n                    if calc_lower in sig_name.lower() or sig_name.lower() in calc_lower:\n                        calc_name = sig_name\n                        break\n                else:\n                    calc_name = None\n    except Exception:\n        pass\n\n    # Python fallback for identification\n    if not calc_name:\n        pattern = python_identify(question)\n        if pattern:\n            for name, spec in calculator_simple.CALCULATOR_REGISTRY.items():\n                if isinstance(spec, calculator_simple.CalculatorSpec):\n                    if pattern.lower() in spec.name.lower():\n                        calc_name = spec.name\n                        break\n\n    if not calc_name:\n        return _reasoning_fallback(patient_note, question)\n\n    # ---- Stage 2: Extract values (LLM with calculator-specific context) ----\n    sig = signatures.get(calc_name, {})\n    required = sig.get(\"required\", [])\n    optional = sig.get(\"optional\", [])\n\n    extracted = _extract_values_two_stage(\n        patient_note, calc_name, required, optional\n    )\n\n    # ---- Stage 3: Validate + compute_calculation (ptools interface) ----\n    is_valid, missing, cleaned = _validate_extracted_values(extracted, calc_name)\n\n    if missing and not is_valid:\n        repaired = _repair_extraction(patient_note, calc_name, cleaned, missing)\n        is_valid, missing, cleaned = _validate_extracted_values(repaired, calc_name)\n\n    if is_valid:\n        try:\n            result = compute_calculation(calc_name, cleaned)\n            if isinstance(result, dict) and result.get('result') is not None:\n                res = result['result']\n                import datetime\n                if isinstance(res, (datetime.date, datetime.datetime)):\n                    return res.strftime('%m/%d/%Y')\n                return res\n        except Exception:\n            pass\n\n    # Fallback: chain-of-thought reasoning\n    return _reasoning_fallback(patient_note, question)\n\n# backward compat alias\npipeline_workflow = workflow\n\n\n# =============================================================================\n# L4 helper functions (inline LLM calls for extraction pipeline)\n# =============================================================================\n\ndef _extract_values_two_stage(\n    patient_note: str,\n    calculator_name: str,\n    required_values: list[str],\n    optional_values: list[str],\n) -> dict:\n    \"\"\"Two-stage extraction: medical reasoning \u2192 structured extraction.\"\"\"\n    import calculator_simple\n\n    docstring = calculator_simple.get_calculator_docstring(calculator_name)\n    model = config.require(\"llm.model\")\n\n    # Check if scoring system (needs medical reasoning first)\n    is_scoring = any(kw in calculator_name.lower() for kw in [\n        'score', 'criteria', 'index', 'risk', 'cha2ds2', 'heart', 'wells',\n        'curb', 'sofa', 'apache', 'child-pugh', 'meld', 'centor', 'fever',\n        'has-bled', 'rcri', 'charlson', 'caprini', 'blatchford', 'perc'\n    ])\n\n    reasoning_context = \"\"\n    if is_scoring:\n        reasoning_prompt = f\"\"\"You are a medical expert analyzing a patient note for the {calculator_name}.\n\nPATIENT NOTE:\n{patient_note}\n\nTASK: Identify ALL conditions/criteria relevant to this calculator.\nLook for both explicit mentions AND clinical findings that imply conditions.\n\nReturn JSON:\n{{\"reasoning\": \"step-by-step analysis\", \"conditions_present\": [\"list\"], \"conditions_absent\": [\"list\"], \"demographics\": {{\"age\": number, \"sex\": \"male/female\"}}}}\n\"\"\"\n        try:\n            reasoning_response, _ = llm(reasoning_prompt, model)\n            try:\n                reasoning_result = json.loads(reasoning_response)\n            except json.JSONDecodeError:\n                match = re.search(r'\\{[\\s\\S]*\\}', reasoning_response, re.DOTALL)\n                reasoning_result = json.loads(match.group()) if match else {}\n\n            conditions_present = reasoning_result.get(\"conditions_present\", [])\n            conditions_absent = reasoning_result.get(\"conditions_absent\", [])\n            demographics = reasoning_result.get(\"demographics\", {})\n\n            reasoning_context = f\"\"\"\nMEDICAL ANALYSIS (from reasoning stage):\n- Conditions PRESENT: {', '.join(conditions_present) if conditions_present else 'None'}\n- Conditions ABSENT: {', '.join(conditions_absent) if conditions_absent else 'None'}\n- Demographics: Age={demographics.get('age', 'unknown')}, Sex={demographics.get('sex', 'unknown')}\n\"\"\"\n        except Exception:\n            pass\n\n    # Build explicit field list so the LLM knows exactly what to return\n    all_fields = required_values + optional_values\n    field_list = ', '.join(f'\"{f}\"' for f in all_fields) if all_fields else '(see calculator description)'\n\n    # Stage 2: Structured extraction\n    extraction_prompt = f\"\"\"Extract values from the patient note for the {calculator_name} calculator.\n{reasoning_context}\nCALCULATOR DESCRIPTION:\n{docstring or 'No description available.'}\n\nPATIENT NOTE:\n{patient_note}\n\nYou MUST return values for these exact parameter names: [{field_list}]\n\nINSTRUCTIONS:\n- Use the EXACT parameter names listed above as JSON keys\n- Read the calculator description carefully for what each parameter means\n- For score/grade parameters (e.g. \"temperature_score\", \"ascites_grade\"):\n  map clinical findings to the numeric score described in the calculator description\n- Extract numeric values with proper units (age in years, weight in kg, height in cm)\n- Convert units as needed (lbs\u2192kg: \u00d70.453592, feet/inches\u2192cm)\n- For sex: \"man\"/\"male\"/\"he\" \u2192 \"male\", \"woman\"/\"female\"/\"she\" \u2192 \"female\"\n- For boolean conditions: True if present, False if absent\n- If a condition is not mentioned, assume it is absent (False or 0)\n\nReturn ONLY valid JSON:\n{{\"extracted\": {{\"param_name\": value, ...}}, \"missing\": [\"values truly not determinable from note\"]}}\n\"\"\"\n    try:\n        response, _ = llm(extraction_prompt, model)\n        try:\n            result = json.loads(response)\n        except json.JSONDecodeError:\n            match = re.search(r'\\{[\\s\\S]*\\}', response, re.DOTALL)\n            result = json.loads(match.group()) if match else {\"extracted\": {}, \"missing\": required_values}\n        return result.get(\"extracted\", {})\n    except Exception:\n        return {}\n\n\ndef _validate_extracted_values(\n    extracted: dict, calculator_name: str\n) -> tuple[bool, list[str], dict]:\n    \"\"\"Validate and clean extracted values.\"\"\"\n    import calculator_simple\n\n    # Flatten nested dicts\n    flattened = {}\n    for key, value in extracted.items():\n        if isinstance(value, dict):\n            for subkey, subvalue in value.items():\n                flattened[subkey] = subvalue\n        else:\n            flattened[key] = value\n\n    # Normalize boolean-like values\n    cleaned = {}\n    for key, value in flattened.items():\n        if isinstance(value, str):\n            val_lower = value.lower().strip()\n            if val_lower in (\"true\", \"yes\", \"1\", \"present\", \"positive\"):\n                cleaned[key] = True\n            elif val_lower in (\"false\", \"no\", \"0\", \"absent\", \"negative\"):\n                cleaned[key] = False\n            else:\n                try:\n                    cleaned[key] = float(value)\n                except ValueError:\n                    cleaned[key] = value.strip()\n        elif value is not None:\n            cleaned[key] = value\n\n    signatures = calculator_simple.get_calculator_signatures()\n    sig = signatures.get(calculator_name, {})\n    required = sig.get(\"required\", [])\n    optional = sig.get(\"optional\", [])\n\n    missing = [v for v in required if v not in cleaned or cleaned[v] is None]\n\n    # Route scoring calculators to reasoning fallback when extraction is\n    # unreliable: (a) >=4 optional boolean criteria where extraction\n    # frequently gets conditions wrong, or (b) optional fields exist but\n    # none were extracted (calculator runs entirely on defaults).\n    if not missing and optional:\n        extracted_optional = sum(1 for v in optional if v in cleaned)\n        if len(optional) >= 4 or extracted_optional == 0:\n            missing = [v for v in optional if v not in cleaned]\n\n    return len(missing) == 0, missing, cleaned\n\n\ndef _repair_extraction(\n    patient_note: str, calculator_name: str,\n    current_values: dict, missing: list[str],\n) -> dict:\n    \"\"\"Re-prompt LLM for missing values.\"\"\"\n    import calculator_simple\n    model = config.require(\"llm.model\")\n    docstring = calculator_simple.get_calculator_docstring(calculator_name)\n\n    repair_prompt = f\"\"\"Previous extraction was incomplete for {calculator_name}.\n\nMISSING REQUIRED VALUES: {', '.join(missing)}\nALREADY EXTRACTED: {current_values}\n\nCALCULATOR DESCRIPTION:\n{docstring or 'No description available.'}\n\nPATIENT NOTE:\n{patient_note}\n\nFind the missing values. For sex: infer from pronouns (he\u2192male, she\u2192female).\nReturn ONLY JSON: {{\"extracted\": {{\"value_name\": value, ...}}}}\n\"\"\"\n    try:\n        response, _ = llm(repair_prompt, model)\n        try:\n            parsed = json.loads(response)\n        except json.JSONDecodeError:\n            match = re.search(r'\\{[\\s\\S]*\\}', response, re.DOTALL)\n            parsed = json.loads(match.group()) if match else {\"extracted\": {}}\n        new_extracted = parsed.get(\"extracted\", {})\n        return {**current_values, **new_extracted}\n    except Exception:\n        return current_values\n</ptools_file>", "outcome": "ROLLED BACK\naccuracy: 80.0% -> 80.0%\ncost: $0.0004 -> $0.0005\nbest so far: 80.0%\n", "iteration_history": "Iter 0: train=80.0%, eval=73.6% \u2014 KEPT\nIter 1: train=80.0%, eval=73.6% \u2014 ROLLED BACK\n  What was tried: 1. What SPECIFIC failure pattern did you identify?\nExtraction often returns \"none\" for absent boolean conditions, which gets parsed as a string or float rather than `False`.\n2. How many of the shown failures share this pattern?\nThis is a general extraction issue affecting scoring calculators where absence of a condition needs to be explicitly `False`.\n3. What is the MINIMAL change that fixes this pattern?\nIn `_validate_extracted_values`, add `\"none\"` to the list of string values that map to `False`.\n4. Why will this change NOT break currently working cases?\nIt only affects fields explicitly extracted as \"none\", mapping them correctly to boolean False rather than failing validation or causing a type error in computation.\n  \u26a0 This change HURT accuracy. Do NOT retry this approach.\nIter 2: train=78.2%, eval=70.9% \u2014 ROLLED BACK\n  What was tried: 1. What SPECIFIC failure pattern did you identify?\nMany scoring calculators fail because boolean conditions are extracted as \"None\", \"N/A\", or \"unknown\" instead of explicit `True` or `False`. When these get parsed, they cause missing value cascades or validation errors, falling back to the less structured reasoning pathway.\n2. How many of the shown failures share this pattern?\nSeveral scoring calculators (CHA2DS2-VASc, Wells, Caprini, APACHE II, SOFA) have optional/required boolean fields that suffer from this type of ambiguous extraction.\n3. What is the MINIMAL change that fixes this pattern?\nIn `_extract_values_two_stage`, explicitly instruct the LLM to use `False` for boolean conditions when they are absent or not mentioned, and explicitly forbid returning \"None\", \"N/A\", or \"unknown\" for boolean fields.\n4. Why will this change NOT break currently working cases?\nThis is a pure clarification of how boolean fields should be formatted. It doesn't change the workflow logic, unit conversions, or trigger conditions for any tools. It just ensures the JSON returned by the LLM contains actual boolean values for conditions rather than ambiguous strings.\n  \u26a0 This change HURT accuracy. Do NOT retry this approach.\nIter 3: train=80.0%, eval=73.6% \u2014 ROLLED BACK\n  What was tried: 1. What SPECIFIC failure pattern did you identify?\nScoring calculators with many optional criteria (CHA2DS2-VASc, Caprini, Wells, etc.) are frequently falling back to the less accurate LLM CoT reasoning pathway instead of using the deterministic Python calculator.\n\n2. How many of the shown failures share this pattern?\nSeveral of the failures (CHA2DS2-VASc, Caprini, Wells, APACHE II, SOFA) are scoring systems with numerous optional parameters.\n\n3. What is the MINIMAL change that fixes this pattern?\nIn `_validate_extracted_values`, the validation logic currently intentionally invalidates extractions if a calculator has >= 4 optional fields and the LLM didn't explicitly extract all of them (even if they were correctly omitted because the patient didn't have the conditions). I will remove the `len(optional) >= 4` condition, only routing to fallback if *zero* optional fields were extracted.\n\n4. Why will this change NOT break currently working cases?\nThis is a pure relaxation of a fallback trigger. The Python calculators are already designed to handle missing optional fields (defaulting them to `False` or `0`). By allowing these extractions to pass validation, we send them to the highly accurate Python compute tool instead of forcing the LLM to do complex medical scoring arithmetic.\n  \u26a0 This change HURT accuracy. Do NOT retry this approach.\nIter 4: train=80.0%, eval=73.6% \u2014 ROLLED BACK\n  What was tried: 1. What SPECIFIC failure pattern did you identify?\nThe L4 pipeline computes Estimated Gestational Age accurately but returns it as a float (e.g., 33.857) instead of the required tuple of strings (e.g., `('33 weeks', '5 days')`). The chain-of-thought fallback correctly parses this into a tuple, but the faster, deterministic Python calculation pathway returns the raw float, which fails the evaluation check.\n\n2. How many of the shown failures share this pattern?\nAt least 1 failure (Estimated Gestational Age, train.9393) explicitly shows this output format mismatch (`predicted=33.857, expected=('33 weeks', '5 days')`). This will also affect any other cases that ask for weeks and days but route through the exact deterministic computation.\n\n3. What is the MINIMAL change that fixes this pattern?\nIn the L4 `workflow`, intercept the result returned by `compute_calculation`. If the question asks for \"weeks\" and \"days\" and the result is a float, convert the float into the required tuple format before returning.\n\n4. Why will this change NOT break currently working cases?\nThis change only intercepts and reformats cases where the question explicitly contains \"weeks\" and \"days\" AND the deterministic calculator returns a float. It mirrors the exact same tuple formatting logic that already successfully exists and works in the `_reasoning_fallback` pathway. It doesn't affect extraction, logic routing, or any other numeric calculators.\n  \u26a0 This change HURT accuracy. Do NOT retry this approach.", "diff": "--- before\n+++ after\n@@ -434,7 +434,11 @@\n         try:\n             result = compute_calculation(calc_name, cleaned)\n             if isinstance(result, dict) and result.get('result') is not None:\n-                return result['result']\n+                res = result['result']\n+                import datetime\n+                if isinstance(res, (datetime.date, datetime.datetime)):\n+                    return res.strftime('%m/%d/%Y')\n+                return res\n         except Exception:\n             pass\n \n@@ -627,4 +631,4 @@\n         new_extracted = parsed.get(\"extracted\", {})\n         return {**current_values, **new_extracted}\n     except Exception:\n-        return current_values\n+        return current_values"}];

// --- Populate table ---
const tbody = document.getElementById('iterTable');
DATA.forEach(d => {
  const status = d.kept ? (d.iteration === 0 ? 'BASELINE' : 'KEPT') : 'ROLLBACK';
  const cls = d.kept ? (d.iteration === 0 ? 'baseline' : 'kept') : 'rollback';
  const evalStr = d.eval_accuracy !== null ? (d.eval_accuracy * 100).toFixed(1) + '%' : '—';
  const tr = document.createElement('tr');
  tr.innerHTML = `<td>${d.iteration}</td>
    <td>${(d.train_accuracy * 100).toFixed(1)}%</td>
    <td>${evalStr}</td>
    <td>${d.train_cost ? '$' + d.train_cost.toFixed(4) : '—'}</td>
    <td>${d.supervisor_cost ? '$' + d.supervisor_cost.toFixed(4) : '—'}</td>
    <td class="${cls}">${status}</td>`;
  tbody.appendChild(tr);
});

// --- Populate details ---
const details = document.getElementById('iterDetails');
function makeSection(title, content, startOpen) {
  if (!content || content === '(no changes)') return '';
  const id = 'sec_' + Math.random().toString(36).substr(2);
  const openCls = startOpen ? 'open' : '';
  // Colorize diffs
  let escaped = content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  if (title.includes('Diff')) {
    escaped = escaped.split('\n').map(line => {
      if (line.startsWith('+') && !line.startsWith('+++')) return `<span class="diff-add">${line}</span>`;
      if (line.startsWith('-') && !line.startsWith('---')) return `<span class="diff-del">${line}</span>`;
      if (line.startsWith('@@')) return `<span class="diff-hdr">${line}</span>`;
      return line;
    }).join('\n');
  }
  return `<div class="section">
    <div class="section-title" onclick="document.getElementById('${id}').classList.toggle('open');
      this.textContent = this.textContent.startsWith('▸') ?
        '▾' + this.textContent.slice(1) : '▸' + this.textContent.slice(1);">
      ${startOpen ? '▾' : '▸'} ${title} (${content.length > 1000 ? (content.length/1024).toFixed(0) + 'KB' : content.length + ' chars'})
    </div>
    <div id="${id}" class="section-content ${openCls}"><pre>${escaped}</pre></div>
  </div>`;
}

DATA.forEach(d => {
  const status = d.kept ? (d.iteration === 0 ? 'BASELINE' : 'KEPT') : 'ROLLBACK';
  const tagCls = d.kept ? (d.iteration === 0 ? 'tag-base' : 'tag-kept') : 'tag-roll';
  const evalStr = d.eval_accuracy !== null ? ` | eval: ${(d.eval_accuracy*100).toFixed(1)}%` : '';
  const div = document.createElement('div');
  div.className = 'iter-detail';
  div.innerHTML = `
    <div class="iter-header" onclick="this.classList.toggle('open');
      this.nextElementSibling.classList.toggle('open');">
      <span><strong>Iteration ${d.iteration}</strong> — train: ${(d.train_accuracy*100).toFixed(1)}%${evalStr}
        <span class="tag ${tagCls}">${status}</span></span>
      <span class="arrow">▸</span>
    </div>
    <div class="iter-body">
      ${d.reasoning ? '<div style="margin-bottom:12px"><strong>Reasoning:</strong><br>' +
        d.reasoning.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>') + '</div>' : ''}
      ${makeSection('Code Diff', d.diff, true)}
      ${makeSection('Profiling Summary', d.profiling_summary, false)}
      ${makeSection('Failure Traces', d.failure_traces, false)}
      ${makeSection('Iteration History (sent to supervisor)', d.iteration_history, false)}
      ${makeSection('Supervisor Prompt (full)', d.supervisor_prompt, false)}
      ${makeSection('Supervisor Response (full)', d.supervisor_response, false)}
      ${makeSection('Outcome', d.outcome, false)}
    </div>`;
  details.appendChild(div);
});

// --- Chart (simple canvas) ---
const canvas = document.getElementById('accChart');
const ctx = canvas.getContext('2d');
function drawChart() {
  const W = canvas.width = canvas.offsetWidth;
  const H = canvas.height = 300;
  const pad = { t: 30, r: 20, b: 40, l: 55 };
  const cw = W - pad.l - pad.r;
  const ch = H - pad.t - pad.b;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#161b22';
  ctx.fillRect(0, 0, W, H);

  const n = DATA.length;
  if (n < 2) return;
  const maxAcc = 1.0;
  const minAcc = Math.min(...DATA.map(d => d.train_accuracy),
                          ...DATA.filter(d=>d.eval_accuracy!==null).map(d=>d.eval_accuracy)) - 0.05;

  function x(i) { return pad.l + (i / (n - 1)) * cw; }
  function y(v) { return pad.t + (1 - (v - minAcc) / (maxAcc - minAcc)) * ch; }

  // Grid
  ctx.strokeStyle = '#21262d'; ctx.lineWidth = 1;
  for (let v = Math.ceil(minAcc*10)/10; v <= 1.0; v += 0.1) {
    ctx.beginPath(); ctx.moveTo(pad.l, y(v)); ctx.lineTo(W-pad.r, y(v)); ctx.stroke();
    ctx.fillStyle = '#8b949e'; ctx.font = '11px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText((v*100).toFixed(0)+'%', pad.l-8, y(v)+4);
  }
  // X axis labels
  ctx.textAlign = 'center';
  DATA.forEach((d,i) => { ctx.fillText(d.iteration, x(i), H-pad.b+18); });
  ctx.fillText('Iteration', W/2, H-5);

  // Train line
  ctx.strokeStyle = '#58a6ff'; ctx.lineWidth = 2;
  ctx.beginPath();
  DATA.forEach((d,i) => { i === 0 ? ctx.moveTo(x(i), y(d.train_accuracy)) : ctx.lineTo(x(i), y(d.train_accuracy)); });
  ctx.stroke();

  // Eval line
  const evalData = DATA.filter(d => d.eval_accuracy !== null);
  if (evalData.length > 1) {
    ctx.strokeStyle = '#f0883e'; ctx.lineWidth = 2; ctx.setLineDash([5,5]);
    ctx.beginPath();
    evalData.forEach((d,i) => {
      const xi = x(DATA.indexOf(d));
      i === 0 ? ctx.moveTo(xi, y(d.eval_accuracy)) : ctx.lineTo(xi, y(d.eval_accuracy));
    });
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Points
  DATA.forEach((d,i) => {
    ctx.fillStyle = d.kept ? '#3fb950' : '#f85149';
    ctx.beginPath(); ctx.arc(x(i), y(d.train_accuracy), 5, 0, Math.PI*2); ctx.fill();
    if (d.eval_accuracy !== null) {
      ctx.fillStyle = '#f0883e';
      ctx.beginPath(); ctx.arc(x(DATA.indexOf(d)), y(d.eval_accuracy), 4, 0, Math.PI*2); ctx.fill();
    }
  });

  // Legend
  ctx.font = '12px sans-serif';
  const lx = pad.l + 10, ly = pad.t + 10;
  ctx.fillStyle = '#58a6ff'; ctx.fillRect(lx, ly, 16, 3); ctx.fillText('Train', lx+22, ly+5);
  if (evalData.length > 0) {
    ctx.fillStyle = '#f0883e'; ctx.fillRect(lx, ly+16, 16, 3); ctx.fillText('Eval', lx+22, ly+21);
  }
  ctx.fillStyle = '#3fb950'; ctx.beginPath(); ctx.arc(lx+100, ly+3, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#c9d1d9'; ctx.fillText('Kept', lx+110, ly+5);
  ctx.fillStyle = '#f85149'; ctx.beginPath(); ctx.arc(lx+150, ly+3, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillText('Rollback', lx+160, ly+5);
}
drawChart();
window.addEventListener('resize', drawChart);
</script>
