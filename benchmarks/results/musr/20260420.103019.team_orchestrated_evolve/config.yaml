llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
  max_tokens: 65536
orchestrate:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
  max_retries: 3
  evolve:
    population_size: 3
    n_generations: 1
    stratify_key: null
    train_n: 8
cachier:
  cache_dir: /Users/lauhityareddy/secretagent/benchmarks/musr/llm_cache
echo:
  orchestrate: true
evaluate:
  expt_name: team_orchestrated_evolve
  result_dir: /Users/lauhityareddy/secretagent/benchmarks/musr/results
  entry_point: answer_question
  max_workers: 4
dataset:
  split: team_allocation_val
  shuffle_seed: 42
ptools:
  raw_answer:
    method: simulate
  extract_index:
    method: simulate
  answer_question:
    method: orchestrate
    task_description: 'Determine the best team allocation. You receive a narrative
      about people with different skills and constraints, a question about how to
      assign them to roles, and answer choices. Use the available tools to reason
      about the allocation, then return the 0-based index of the correct choice.

      '
