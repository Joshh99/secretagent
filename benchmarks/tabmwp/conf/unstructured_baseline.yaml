# Unstructured baseline: single LLM call, table in-context, no decomposition
llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1

cachier:
  cache_dir: llm_cache

evaluate:
  expt_name: unstructured_baseline
  result_dir: results
  record_details: true

dataset:
  split: dev1k
  shuffle_seed: 42
  n: 100

ptools:
  tabmwp_solve:
    method: simulate
